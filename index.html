<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Task Viewer</title>
    <style>
        /* 1. CSS Variables: Rang ek jagah set kar diye */
        :root {
            --primary: #2196F3; --danger: #ff5252; --success: #4caf50;
            --gray: #e0e0e0; --dark: #333; --bg: #f4f7f6;
        }

        /* 2. Layout: Pura Page aur Container */
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .app-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 3. Reusable Flex Classes: Taaki code baar-baar na likhna pade */
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .space-between { justify-content: space-between; }

        /* 4. Elements Styling */
        h2 { text-align: center; color: var(--dark); }
        .stats-bar { background: #f0f4f8; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #555; }
        
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); }

        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-clear { background: var(--danger); color: white; width: 100%; margin-bottom: 15px; font-size: 12px; }
        
        .btn-filter { background: var(--gray); color: #555; font-size: 13px; }
        .btn-filter.active { background: var(--dark); color: white; }

        /* 5. List Items */
        .task-list { list-style: none; padding: 0; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .completed-text { text-decoration: line-through; color: #aaa; }
        .btn-status { font-size: 12px; width: 75px; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Task Viewer</h2>

    <div class="stats-bar flex-row space-between">
        <span>Total: <span id="total-tasks">0</span></span>
        <span>Done: <span id="completed-tasks">0</span></span>
    </div>

    <div class="flex-row">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <button class="btn-clear" onclick="clearAll()">Clear All List</button>

    <div class="flex-row" style="justify-content: center;">
        <button class="btn-filter active" onclick="changeFilter('all', this)">All</button>
        <button class="btn-filter" onclick="changeFilter('pending', this)">Pending</button>
        <button class="btn-filter" onclick="changeFilter('completed', this)">Completed</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
</div>

<script>
    // 1. DATA: LocalStorage se uthao ya default rakho
    let tasks = JSON.parse(localStorage.getItem('tasks_db')) || [
        { id: 1, title: "Fix homepage bug", completed: false },
        { id: 2, title: "Buy a banana 🍌", completed: true }
    ];
    let currentFilter = 'all';

    // 2. RENDER: Ek hi function jo sab sambhal lega
    function render() {
        const list = document.getElementById('taskList');
        
        // Data filter logic
        const filtered = tasks.filter(t => 
            currentFilter === 'all' ? true : (currentFilter === 'completed' ? t.completed : !t.completed)
        );

        // UI Generate logic (Using .map)
        list.innerHTML = filtered.map(t => `
            <li class="task-item">
                <span class="${t.completed ? 'completed-text' : ''}">${t.title}</span>
                <button class="btn-status" onclick="toggleTask(${t.id})" 
                        style="background: ${t.completed ? 'var(--danger)' : 'var(--success)'}">
                    ${t.completed ? 'Undo' : 'Done'}
                </button>
            </li>
        `).join('');

        // Stats & LocalStorage update
        document.getElementById('total-tasks').innerText = tasks.length;
        document.getElementById('completed-tasks').innerText = tasks.filter(t => t.completed).length;
        localStorage.setItem('tasks_db', JSON.stringify(tasks));
    }

    // 3. ACTIONS: Button click hone par kya hoga
    function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        tasks.push({ id: Date.now(), title: input.value, completed: false });
        input.value = '';
        render();
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
        render();
    }

    function changeFilter(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function clearAll() {
        if (confirm("Delete everything?")) { tasks = []; render(); }
    }

    // Enter key support
    document.getElementById('taskInput').addEventListener('keypress', e => e.key === 'Enter' && addTask());

    render(); // Starting render
</script>
</body>
</html>
