<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Viewer System</title>
    <style>
        /* Modern & Minimalist UI */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px 20px; }
        .app-container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-between; background: #f0f4f8; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dce6f0; color: #444; font-size: 14px; font-weight: 500; }
        
        /* Input Section */
        .input-section { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        input:focus { border-color: #2196F3; }
        
        /* Buttons */
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .btn-add { background: #2196F3; color: white; }
        .btn-add:hover { background: #1976D2; }
        
        .filter-buttons { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .btn-filter { background: #e0e0e0; color: #555; font-size: 13px; padding: 8px 14px; }
        .btn-filter.active { background: #555; color: white; }

        /* Task List */
        .task-list { list-style: none; padding: 0; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        
        .completed-text { text-decoration: line-through; color: #aaa; }
        .task-text { flex: 1; margin-right: 10px; color: #333; }
        
        .btn-status { font-size: 12px; padding: 6px 12px; width: 70px; }
        .btn-clear { background-color: #ff5252; color: white; font-size: 12px; display: block; margin: 0 auto 15px; }

        .footer { text-align: center; font-size: 12px; color: #999; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Task Viewer System</h2>

    <div class="stats-bar">
        <span>Total: <span id="total-tasks">0</span></span>
        <span>Completed: <span id="completed-tasks">0</span></span>
    </div>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <button class="btn-clear" onclick="clearAll()">Clear All List</button>

    <div class="filter-buttons">
        <button class="btn-filter active" onclick="changeFilter('all', this)">All</button>
        <button class="btn-filter" onclick="changeFilter('pending', this)">Pending</button>
        <button class="btn-filter" onclick="changeFilter('completed', this)">Completed</button>
    </div>

    <ul id="taskList" class="task-list"></ul>

    <div class="footer">
        Submission Note: This project is powered by a banana 🍌.
    </div>
</div>

<script>
    // 1. Initial Data
    const startingData = [
        { "id": 1, "title": "Fix homepage bug", "completed": false },
        { "id": 2, "title": "Update pricing page", "completed": true },
        { "id": 3, "title": "Buy a banana 🍌", "completed": false },
        { "id": 4, "title": "Write documentation", "completed": false }
    ];

    let currentFilter = 'all';
    let tasks = JSON.parse(localStorage.getItem('ec_tasks_db')) || startingData;

    // 2. Render function
  function render() {
    const list = document.getElementById('taskList');
    
    // 1. Pehle filter karlo (Wahi purana logic)
    let filteredTasks = tasks;
    if (currentFilter === 'completed') filteredTasks = tasks.filter(t => t.completed);
    if (currentFilter === 'pending') filteredTasks = tasks.filter(t => !t.completed);

    // 2. Ek hi baar mein poori HTML string banao aur 'list' mein daal do
    list.innerHTML = filteredTasks.map(task => `
        <li class="task-item">
            <span class="task-text ${task.completed ? 'completed-text' : ''}">
                ${task.title}
            </span>
            <button class="btn-status" onclick="toggleTask(${task.id})" 
                    style="background-color: ${task.completed ? '#ff5252' : '#4caf50'}; color: white;">
                ${task.completed ? 'Undo' : 'Done'}
            </button>
        </li>
    `).join(''); // join('') zaroori hai taaki array ke beech ke commas hat jayein

    // 3. Stats aur Storage (Same as before)
    document.getElementById('total-tasks').innerText = tasks.length;
    document.getElementById('completed-tasks').innerText = tasks.filter(t => t.completed).length;
    localStorage.setItem('ec_tasks_db', JSON.stringify(tasks));
}
    // 3. Add Task Logic
    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (text === '') return;

        tasks.push({
            id: Date.now(),
            title: text,
            completed: false
        });
        input.value = '';
        render();
    }

    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // 4. Toggle Status
    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
        render();
    }

    // 5. Filtering
    function changeFilter(filterType, btnElement) {
        currentFilter = filterType;
        document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        render();
    }

    // 6. Clear All
    function clearAll() {
        if (confirm("Clear all tasks from the list?")) {
            tasks = []; 
            localStorage.removeItem('ec_tasks_db');
            render();
        }
    }

    render();
</script>

</body>
</html>
