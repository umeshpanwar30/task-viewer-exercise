<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task App</title>
    <style>
        /* 1. Base Setup: Center everything */
        body { font-family: sans-serif; background: #f4f7f6; display: grid; place-items: center; min-height: 100vh; margin: 0; }
        .app { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 350px; }
        
        /* 2. Flex Layout: Ek line mein saaman rakhne ke liye */
        .row { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
        .between { justify-content: space-between; }
        
        /* 3. Simple Elements */
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        
        /* 4. Colors & List */
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #ff5252; color: white; width: 100%; margin-bottom: 10px; }
        .active { background: #333 !important; color: white; }
        
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .done { text-decoration: line-through; color: #aaa; }
    </style>
</head>
<body>

<div class="app">
    <h3 style="text-align:center">Task Viewer</h3>

    <div class="row between" style="font-size: 14px; background: #eee; padding: 8px; border-radius: 5px;">
        <span>Total: <b id="total">0</b></span>
        <span>Done: <b id="done">0</b></span>
    </div>

    <div class="row">
        <input type="text" id="in" placeholder="New task...">
        <button class="btn-blue" onclick="add()">Add</button>
    </div>

    <button class="btn-red" onclick="clearAll()">Clear List</button>

    <div class="row" style="justify-content: center;">
        <button onclick="setFilter('all', this)" class="active">All</button>
        <button onclick="setFilter('pending', this)">Pending</button>
        <button onclick="setFilter('completed', this)">Done</button>
    </div>

    <ul id="list"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('db')) || [];
    let filter = 'all';

    function render() {
        const el = document.getElementById('list');
        const filtered = tasks.filter(t => filter==='all' ? true : (filter==='completed' ? t.done : !t.done));

        el.innerHTML = filtered.map(t => `
            <li>
                <span class="${t.done ? 'done' : ''}">${t.title}</span>
                <button onclick="toggle(${t.id})" style="background:${t.done?'#ff5252':'#4caf50'}; color:white">
                    ${t.done ? 'Undo' : 'Done'}
                </button>
            </li>
        `).join('');

        document.getElementById('total').innerText = tasks.length;
        document.getElementById('done').innerText = tasks.filter(t => t.done).length;
        localStorage.setItem('db', JSON.stringify(tasks));
    }

    function add() {
        const input = document.getElementById('in');
        if(!input.value) return;
        tasks.push({ id: Date.now(), title: input.value, done: false });
        input.value = '';
        render();
    }

    function toggle(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        render();
    }

    function setFilter(f, btn) {
        filter = f;
        document.querySelectorAll('.row button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function clearAll() { if(confirm("Delete?")) { tasks = []; render(); } }

    render();
</script>
</body>
</html>
